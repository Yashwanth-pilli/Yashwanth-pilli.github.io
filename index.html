<!--
  Yashwanth Dharan Tej Pilli — cosmic star-map portfolio v5.
  A universe of scattered worlds. The camera FLIES between them as you scroll —
  each section is its own location: a solar system, a rotating Earth, nebulae, gas giants, star clusters.
  Self-contained; Earth + cloud textures baked in. No external assets.
-->

<html lang="en">

<body>
<style>
  :root{
    --void:#03050d; --cyan:#38e0d6; --cyan-2:#8ff3ee; --gold:#f0cf74; --magenta:#e768a6; --violet:#8b7bff;
    --ink:#e6effc; --muted:#8496b6; --line:#22324e;
    --mono:ui-monospace,"Cascadia Code","JetBrains Mono","SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --glow:0 0 22px rgba(56,224,214,.5);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:auto}
  body{background:var(--void);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit} ::selection{background:var(--cyan);color:#02121a}
  #spacer{width:1px;pointer-events:none}

  canvas.layer{position:fixed;inset:0;pointer-events:none}
  #galaxy{z-index:0} #warp{z-index:1}
  #flash{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:0;background:radial-gradient(circle at 50% 45%,rgba(255,252,235,.9),rgba(240,207,116,.4) 30%,transparent 60%)}
  .vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(150% 120% at 50% 46%,transparent 40%,rgba(3,5,13,.9))}

  /* ── the universe + camera ── */
  #universe{position:fixed;left:0;top:0;width:0;height:0;z-index:4;will-change:transform;transform-origin:0 0}
  .wp{position:absolute;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;gap:clamp(24px,4vw,60px)}
  .wp.lay-b{flex-direction:column} .wp.lay-l{flex-direction:row-reverse}
  @media (max-width:820px){ .wp{flex-direction:column!important;gap:20px} }
  .worldbox{flex:none;display:flex;align-items:center;justify-content:center;position:relative}
  .wtag{position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);white-space:nowrap;opacity:.32;transition:opacity .4s,color .4s;pointer-events:none}
  .wp.here .wtag{opacity:1;color:var(--cyan);text-shadow:0 0 14px rgba(56,224,214,.6)}

  .panel{width:min(460px,86vw);text-align:left;background:rgba(6,11,22,.74);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);
    border:1px solid rgba(56,224,214,.22);border-radius:18px;padding:26px 26px 28px;box-shadow:0 30px 70px -30px #000,0 0 44px -20px rgba(56,224,214,.4);
    opacity:0;transition:opacity .4s}
  .wp.here .panel{opacity:1}
  .panel.center{text-align:center}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--cyan);display:block;margin-bottom:12px}
  .stitle{font-family:var(--mono);font-weight:700;line-height:1.05;text-wrap:balance;font-size:clamp(1.5rem,3.4vw,2.5rem);letter-spacing:-.01em}
  .stitle .g{color:var(--gold)} .stitle .m{color:var(--magenta)}
  .lead{font-size:14.5px;line-height:1.62;color:#c9d6ec;margin-top:14px}

  /* content bits */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .grp{margin-top:14px} .grp h4{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
  .chip{font-family:var(--mono);font-size:12px;padding:5px 11px;border-radius:8px;border:1px solid var(--line);background:rgba(56,224,214,.05);color:#cfe0f4;transition:.15s}
  .chip:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:var(--glow)}
  .chip.acc{border-color:rgba(240,207,116,.4);color:var(--gold);background:rgba(240,207,116,.06)}
  .chip.star::before{content:"✦ ";color:var(--cyan)}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
  @media (max-width:520px){ .cards{grid-template-columns:1fr} }
  .card{border:1px solid var(--line);border-radius:12px;padding:13px;background:rgba(8,15,30,.66);position:relative;transition:.16s;text-decoration:none;display:block}
  .card:hover{transform:translateY(-3px);border-color:var(--cyan);box-shadow:0 14px 30px -14px #000,var(--glow)}
  .card p{font-size:12px;line-height:1.5;color:var(--muted);margin-top:7px}
  .card .rn{font-family:var(--mono);font-size:12.5px;color:var(--cyan-2)}
  .card .rf{display:flex;gap:12px;align-items:center;font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:9px}
  .lang{display:inline-flex;align-items:center;gap:6px}.lang i{width:9px;height:9px;border-radius:50%;display:inline-block}
  .live{position:absolute;top:10px;right:10px;font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;color:#8affc0;border:1px solid #2a7d52;border-radius:20px;padding:2px 7px;background:rgba(20,60,40,.5)}
  .live::before{content:"● ";color:#3ff08a;animation:blinkc 1.2s infinite}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
  .stat{border:1px solid var(--line);border-radius:12px;padding:14px;background:rgba(8,15,30,.6)}
  .stat b{display:block;font-family:var(--mono);font-size:1.7rem;color:var(--gold);font-variant-numeric:tabular-nums;line-height:1;text-shadow:0 0 20px rgba(240,207,116,.5)}
  .stat span{font-size:11px;color:var(--muted);margin-top:6px;display:block}
  .items{margin-top:12px}
  .item{padding:11px 0;border-top:1px solid var(--line)} .item:first-child{border-top:0}
  .item .h{display:flex;justify-content:space-between;gap:10px;align-items:baseline;flex-wrap:wrap}
  .item .t{font-weight:600;font-size:14px;color:#eff5fd} .item .mm{font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;color:var(--cyan)}
  .item p{font-size:12.5px;line-height:1.5;color:var(--muted);margin-top:4px} .item ul{margin:5px 0 0;padding-left:16px}
  .item li{font-size:12.5px;line-height:1.5;color:#b6c3da;margin-top:3px}
  .links{display:flex;flex-wrap:wrap;gap:9px;margin-top:16px}
  .link{display:inline-flex;align-items:center;gap:7px;text-decoration:none;font-family:var(--mono);font-size:12.5px;padding:10px 13px;border-radius:10px;border:1px solid var(--line);color:#d6e2f3;background:rgba(56,224,214,.05);transition:.15s}
  .link:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:var(--glow);transform:translateY(-2px)}
  .link:focus-visible,.btn:focus-visible,.cta:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .big{font-family:var(--mono);font-weight:700;font-size:clamp(2.2rem,6vw,4.4rem);letter-spacing:.02em;line-height:1}
  .big .g{color:var(--gold)}
  .cta{margin-top:24px;font-family:var(--mono);font-size:14px;letter-spacing:.18em;cursor:pointer;color:#02121a;background:var(--cyan);border:0;border-radius:12px;padding:15px 32px;box-shadow:0 0 34px rgba(56,224,214,.55);transition:.15s}
  .cta:hover{transform:translateY(-2px);box-shadow:0 0 50px rgba(56,224,214,.85)}
  .scrollhint{margin-top:18px;font-family:var(--mono);font-size:12px;letter-spacing:.14em;color:var(--muted);opacity:0;transition:opacity .5s}
  .scrollhint.show{opacity:1;animation:floaty 1.8s ease-in-out infinite}
  @keyframes floaty{50%{transform:translateY(6px)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes blinkc{50%{opacity:.35}}
  @keyframes breathe{50%{opacity:.7;transform:scale(1.05)}}

  /* ── WORLDS ── */
  /* generic planet */
  .w-planet{position:relative;width:var(--sz);height:var(--sz);border-radius:50%;
    background:radial-gradient(circle at 34% 30%,var(--pl),var(--pm) 52%,var(--pd) 90%);
    box-shadow:inset -18px -12px 34px rgba(0,0,6,.7),inset 12px 8px 22px rgba(255,255,255,.12),0 0 42px 6px var(--pg);animation:bob 7s ease-in-out infinite}
  @keyframes bob{50%{transform:translateY(-8px)}}
  .w-planet.banded{background:repeating-linear-gradient(98deg,var(--pl) 0 6px,var(--pm) 6px 12px,var(--pd) 12px 17px);overflow:hidden}
  .w-planet .pring{position:absolute;left:50%;top:50%;width:calc(var(--sz)*2);height:calc(var(--sz)*2);margin:calc(var(--sz)*-1) 0 0 calc(var(--sz)*-1);border-radius:50%;
    border:5px solid var(--rc,rgba(230,205,150,.55));transform:rotate(20deg) scaleY(.34);box-shadow:0 0 16px rgba(240,207,116,.25)}
  .w-planet .pmoon{position:absolute;left:50%;top:50%;offset-path:path("M -110,0 A 110,40 0 1,1 110,0 A 110,40 0 1,1 -110,0");offset-rotate:0deg;animation:moonorb 12s linear infinite}
  .w-planet .pmoon i{display:block;width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 34% 30%,#eef1f8,#8791a8)}
  @keyframes moonorb{to{offset-distance:100%}}

  /* nebula cloud */
  .w-neb{position:relative;width:var(--sz);height:var(--sz)}
  .w-neb::before,.w-neb::after{content:"";position:absolute;inset:0;border-radius:50%;filter:blur(22px);animation:breathe 6s ease-in-out infinite}
  .w-neb::before{background:radial-gradient(circle at 40% 40%,var(--nc),transparent 62%)}
  .w-neb::after{background:radial-gradient(circle at 64% 62%,var(--nc2,var(--nc)),transparent 58%);animation-delay:1.5s;opacity:.8}
  .w-neb .core{position:absolute;left:50%;top:50%;width:26%;height:26%;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,#fff,var(--nc) 70%,transparent);box-shadow:0 0 40px 10px var(--nc)}

  /* star cluster / galaxy core */
  .w-cluster{position:relative;width:var(--sz);height:var(--sz);border-radius:50%;
    background:radial-gradient(circle,rgba(255,250,235,.95),var(--cc) 22%,transparent 62%);box-shadow:0 0 60px 16px var(--cc);animation:breathe 4s ease-in-out infinite}
  .w-cluster .spk{position:absolute;left:50%;top:50%;width:2px;height:calc(var(--sz)*1.9);background:linear-gradient(var(--cc),transparent);transform-origin:top;opacity:.5}
  .w-cluster .spk.h{width:calc(var(--sz)*1.9);height:2px;background:linear-gradient(90deg,transparent,var(--cc),transparent);left:calc(50% - var(--sz)*.95);top:50%}
  .w-cluster .spk.v{left:50%;top:calc(50% - var(--sz)*.95);background:linear-gradient(transparent,var(--cc),transparent)}

  /* ── SOLAR SYSTEM ── */
  .solar{position:relative;width:560px;height:340px;transform:scaleY(.6)}
  .sun{position:absolute;left:50%;top:50%;width:60px;height:60px;margin:-30px 0 0 -30px;border-radius:50%;z-index:9;transform:scaleY(1.667);
    background:radial-gradient(circle at 50% 45%,#fff6d8,#ffd463 40%,#ff9d2e 72%,#f2731f);box-shadow:0 0 34px 8px rgba(255,180,60,.8),0 0 80px 24px rgba(255,140,40,.45);animation:sunpulse 3.6s ease-in-out infinite}
  @keyframes sunpulse{50%{box-shadow:0 0 46px 12px rgba(255,190,70,.95),0 0 100px 30px rgba(255,150,45,.55)}}
  .orb{position:absolute;left:50%;top:50%;border-radius:50%;border:1px solid rgba(120,150,200,.13);transform:translate(-50%,-50%);animation:spin linear infinite}
  .pl{position:absolute;left:50%;top:0;transform:translate(-50%,-50%) scaleY(1.667);border-radius:50%}
  .pl::after{content:"";position:absolute;inset:0;border-radius:50%;box-shadow:inset -3px -2px 6px rgba(0,0,10,.6),inset 2px 2px 4px rgba(255,255,255,.25)}
  .p-mer{width:9px;height:9px;background:radial-gradient(circle at 34% 30%,#b9b2a6,#6d665c)}
  .p-ven{width:14px;height:14px;background:radial-gradient(circle at 34% 30%,#f4dfa8,#c69a54)}
  .p-ear{width:15px;height:15px;background:radial-gradient(circle at 34% 30%,#8fd0ff,#2f7fd0 55%,#1a4f86);box-shadow:0 0 8px rgba(90,160,255,.7)}
  .p-mar{width:12px;height:12px;background:radial-gradient(circle at 34% 30%,#f2a074,#c0532c 60%,#7d2f18)}
  .p-jup{width:30px;height:30px;background:repeating-linear-gradient(96deg,#e8c9a0 0 4px,#c79c6a 4px 8px,#d8b487 8px 11px);border-radius:50%}
  .p-sat{width:26px;height:26px;background:repeating-linear-gradient(96deg,#f0d8a6 0 4px,#d3b276 4px 8px)}
  .p-sat .sring{position:absolute;left:50%;top:50%;width:52px;height:52px;margin:-26px 0 0 -26px;border-radius:50%;border:3px solid rgba(230,205,150,.6);transform:rotate(18deg) scaleY(.36)}
  .p-ura{width:19px;height:19px;background:radial-gradient(circle at 34% 30%,#c6f4f2,#7fc7cf 60%,#4f92a6)}
  .p-nep{width:18px;height:18px;background:radial-gradient(circle at 34% 30%,#7aa8ff,#2f5fd0 60%,#22408f)}

  /* ── EARTH ── */
  .earthsys{position:relative;width:300px;height:300px}

  var lastSy=0;
  function warpVel(){var v=Math.abs(scrollY-lastSy);lastSy=scrollY;targetSpeed=Math.min(0.5+v*0.13,13);}
  function warpBoost(){targetSpeed=15;}
  function warp(){speed+=(targetSpeed-speed)*0.08;targetSpeed+=(0.5-targetSpeed)*0.04;wx.clearRect(0,0,W,H);
    for(var i=0;i<stars.length;i++){var s=stars[i];s.pz=s.z;s.z-=speed*6;if(s.z<1){stars[i]=mk();stars[i].z=W;continue;}
      var k=128/s.z,x=cx+s.x*k,y=cy+s.y*k,pk=128/s.pz,px=cx+s.x*pk,py=cy+s.y*pk,r=Math.max(.4,(1-s.z/W)*2.1);
      var hue=(s.x+s.y)%3,col=hue<1?"56,224,214":hue<2?"240,207,116":"231,104,166";
      wx.strokeStyle="rgba("+col+","+Math.min(1,(1-s.z/W)+.15)+")";wx.lineWidth=r;wx.beginPath();wx.moveTo(px,py);wx.lineTo(x,y);wx.stroke();}
    requestAnimationFrame(warp);}
  sizeW();initStars();warp();
  addEventListener("resize",function(){sizeG();initGalaxy();sizeW();initStars();layoutFn();update();});

  // ── controls ──
  var hudtop=document.getElementById("hudtop"),hudbot=document.getElementById("hudbot");
  var launchBtn=document.getElementById("launchBtn"),hint=document.getElementById("hint");
  setTimeout(function(){if(hint)hint.classList.add("show");},1400);
  function reveal(){hudtop.classList.add("show");hudbot.classList.add("show");rail.classList.add("show");document.getElementById("minimap").classList.add("show");}
  if(launchBtn)launchBtn.addEventListener("click",function(){skipIntro();warpBoost();reveal();flyTo(1);});
  function flyTo(i){autoOff();smoothScroll(i*SCROLL,1000);}
  function smoothScroll(to,dur){var from=scrollY,st=null;(function step(t){if(!st)st=t;var p=Math.min((t-st)/dur,1),e=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;scrollTo(0,from+(to-from)*e);if(p<1)requestAnimationFrame(step);})(performance.now());}
  document.getElementById("bUp").addEventListener("click",function(){autoOff();flyTo(Math.max(0,Math.round(scrollY/SCROLL)-1));});
  document.getElementById("bDown").addEventListener("click",function(){autoOff();flyTo(Math.min(WP.length-1,Math.round(scrollY/SCROLL)+1));});
  var auto=false,autoBtn=document.getElementById("bAuto"),autoTimer=null;
  autoBtn.addEventListener("click",function(){auto?autoOff():autoOn();});
  function autoOn(){auto=true;autoBtn.classList.add("on");autoBtn.textContent="STOP";reveal();tickAuto();}
  function autoOff(){if(!auto)return;auto=false;autoBtn.classList.remove("on");autoBtn.textContent="AUTO-FLY";clearTimeout(autoTimer);}
  function tickAuto(){var next=Math.round(scrollY/SCROLL)+1;if(next>WP.length-1){autoOff();return;}smoothScroll(next*SCROLL,1300);autoTimer=setTimeout(tickAuto,3000);}
  addEventListener("keydown",function(e){
    if(e.key==="ArrowDown"||e.key==="PageDown"||e.key===" "){e.preventDefault();autoOff();flyTo(Math.min(WP.length-1,Math.round(scrollY/SCROLL)+1));}
    else if(e.key==="ArrowUp"||e.key==="PageUp"){e.preventDefault();autoOff();flyTo(Math.max(0,Math.round(scrollY/SCROLL)-1));}});

  // ── nav minimap ──
  var mmc=document.getElementById("mmc"),mmx=mmc.getContext("2d"),MW=172,MH=132,mpad=16;
  var xs=WP.map(function(w){return w.x;}),ys=WP.map(function(w){return w.y;});
  var minX=Math.min.apply(0,xs),maxX=Math.max.apply(0,xs),minY=Math.min.apply(0,ys),maxY=Math.max.apply(0,ys);
  function mapX(x){return mpad+(x-minX)/(maxX-minX)*(MW-2*mpad);}
  function mapY(y){return mpad+8+(y-minY)/(maxY-minY)*(MH-2*mpad-8);}
  function drawMap(){
    mmx.clearRect(0,0,MW,MH);
    mmx.strokeStyle="rgba(120,150,200,.32)";mmx.lineWidth=1;mmx.setLineDash([3,3]);
    mmx.beginPath();WP.forEach(function(w,i){var X=mapX(w.x),Y=mapY(w.y);i?mmx.lineTo(X,Y):mmx.moveTo(X,Y);});mmx.stroke();mmx.setLineDash([]);
    WP.forEach(function(w,i){var X=mapX(w.x),Y=mapY(w.y),on=(i===active);
      mmx.fillStyle=on?"#f0cf74":"rgba(150,180,220,.55)";mmx.beginPath();mmx.arc(X,Y,on?3.4:2,0,6.283);mmx.fill();
      if(on){mmx.strokeStyle="rgba(240,207,116,.55)";mmx.lineWidth=1;mmx.beginPath();mmx.arc(X,Y,6,0,6.283);mmx.stroke();}});
    var sx=mapX(curCamX),sy=mapY(curCamY);
    mmx.fillStyle="#38e0d6";mmx.beginPath();mmx.arc(sx,sy,2.6,0,6.283);mmx.fill();
    mmx.strokeStyle="rgba(56,224,214,.75)";mmx.lineWidth=1;mmx.beginPath();mmx.arc(sx,sy,5,0,6.283);mmx.stroke();
    requestAnimationFrame(drawMap);
  }
  drawMap();
  mmc.addEventListener("click",function(e){var r=mmc.getBoundingClientRect(),k=MW/r.width,
    cxp=(e.clientX-r.left)*k,cyp=(e.clientY-r.top)*(MH/r.height),best=0,bd=1e9;
    WP.forEach(function(w,i){var dx=mapX(w.x)-cxp,dy=mapY(w.y)-cyp,d=dx*dx+dy*dy;if(d<bd){bd=d;best=i;}});flyTo(best);});

  // ── cinematic intro sweep ──
  var introOn=true,introStart=null,introSkip=false;
  var bcx=(minX+maxX)/2,bcy=(minY+maxY)/2;
  function skipIntro(){introSkip=true;}
  function intro(ts){ if(!introStart)introStart=ts;
    var p=Math.min((ts-introStart)/2600,1); if(introSkip)p=Math.max(p,0.94);
    var e=smooth(p);
    applyCam(bcx+(WP[0].x-bcx)*e, bcy+(WP[0].y-bcy)*e, 0.42+(1.08-0.42)*e);
    if(p<1)requestAnimationFrame(intro); else {introOn=false;active=-1;update();}
  }
  addEventListener("wheel",skipIntro,{passive:true,once:true});
  addEventListener("touchstart",skipIntro,{passive:true,once:true});
  requestAnimationFrame(intro);

  update();
})();
</script>
