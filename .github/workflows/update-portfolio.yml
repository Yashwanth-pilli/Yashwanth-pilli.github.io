name: Auto-update portfolio projects

on:
  schedule:
    - cron: "0 7,19 * * *"    # twice a day
  workflow_dispatch:

concurrency:
  group: portfolio-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - name: Sync repos into portfolio
        env:
          OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          gen(){ python .github/scripts/portfolio_repos.py; }
          gen
          if git diff --quiet -- index.html; then echo "no changes"; exit 0; fi
          for a in 1 2 3; do
            git add index.html
            git commit -m "auto: sync portfolio projects from GitHub" || true
            if git push; then echo "pushed"; exit 0; fi
            git fetch origin main; git reset --hard origin/main; gen
            if git diff --quiet -- index.html; then echo "in sync"; exit 0; fi
          done
          echo "will self-heal next run"; exit 0
